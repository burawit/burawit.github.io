<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#16437E">
    <title>Asset Scanner</title>
    <link rel="manifest"
        href='data:application/json,{"name":"Asset Scanner","short_name":"Assets","start_url":".","display":"standalone","background_color":"%23fafaf7","theme_color":"%2316437E"}'>
    <style>
        :root {
            /* โทนสีตาม logo AEROTHAI: น้ำเงิน navy + แดง */
            --green-900: #16437E;
            --green-700: #1E5AA8;
            --green-100: #DBE8F8;
            --aero-red: #D6001C;
            --ink: #1c1917;
            --ink-2: #57534e;
            --ink-3: #a8a29e;
            --paper: #fafaf7;
            --card: #ffffff;
            --line: #e7e5e0;
            --amber-100: #fef3c7;
            --amber-800: #92400e;
            --red-100: #fee2e2;
            --red-700: #b91c1c;
            --radius: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, "Segoe UI", "Noto Sans Thai", Roboto, sans-serif;
            background: var(--paper);
            color: var(--ink);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background: var(--green-900);
            color: #fff;
            padding: max(env(safe-area-inset-top), 10px) 16px 12px;
        }

        header h1 {
            font-size: 17px;
            font-weight: 600;
        }

        header p {
            font-size: 12px;
            color: #bcd7f5;
            margin-top: 2px;
        }

        main {
            flex: 1;
            overflow-y: auto;
            padding: 14px 14px 90px;
        }

        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* ---------- Scan screen ---------- */
        #video-wrap {
            position: relative;
            background: #000;
            border-radius: 14px;
            overflow: hidden;
            aspect-ratio: 4/3;
            margin-bottom: 12px;
        }

        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .scan-frame {
            position: absolute;
            inset: 28% 8%;
            border: none;
            pointer-events: none;
        }

        .scan-frame::before,
        .scan-frame::after,
        .scan-frame b::before,
        .scan-frame b::after {
            content: "";
            position: absolute;
            width: 26px;
            height: 26px;
            border: 3px solid #fff;
            border-radius: 2px;
        }

        .scan-frame::before {
            top: 0;
            left: 0;
            border-right: 0;
            border-bottom: 0;
        }

        .scan-frame::after {
            top: 0;
            right: 0;
            border-left: 0;
            border-bottom: 0;
        }

        .scan-frame b::before {
            bottom: 0;
            left: 0;
            border-right: 0;
            border-top: 0;
        }

        .scan-frame b::after {
            bottom: 0;
            right: 0;
            border-left: 0;
            border-top: 0;
        }

        #video-hint {
            position: absolute;
            bottom: 10px;
            left: 0;
            right: 0;
            text-align: center;
            color: #e7e5e0;
            font-size: 12px;
            text-shadow: 0 1px 3px rgba(0, 0, 0, .7);
        }

        .manual-row {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .manual-row input {
            flex: 1;
            padding: 11px 12px;
            font-size: 15px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--card);
            color: var(--ink);
        }

        .manual-row input:focus {
            outline: 2px solid var(--green-700);
            border-color: transparent;
        }

        /* ---------- Cards / fields ---------- */
        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            padding: 14px;
            margin-bottom: 12px;
        }

        .card h2 {
            font-size: 13px;
            font-weight: 600;
            color: var(--ink-2);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: .4px;
        }

        .frow {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            padding: 7px 0;
            border-bottom: 1px dashed var(--line);
        }

        .frow:last-child {
            border-bottom: 0;
        }

        .frow .k {
            font-size: 13px;
            color: var(--ink-3);
            flex-shrink: 0;
        }

        .frow .v {
            font-size: 14px;
            font-weight: 500;
            text-align: right;
            word-break: break-all;
        }

        .badge {
            display: inline-block;
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 99px;
        }

        .badge.ok {
            background: #dcfce7;
            color: #166534;
        }

        .badge.warn {
            background: var(--amber-100);
            color: var(--amber-800);
        }

        .badge.err {
            background: var(--red-100);
            color: var(--red-700);
        }

        /* ---------- Buttons ---------- */
        .btn {
            display: block;
            width: 100%;
            padding: 13px;
            font-size: 15px;
            font-weight: 600;
            border: 0;
            border-radius: var(--radius);
            cursor: pointer;
            margin-top: 8px;
            font-family: inherit;
        }

        .btn:active {
            transform: scale(.98);
        }

        .btn-primary {
            background: var(--green-900);
            color: #fff;
        }

        #capture-btn {
            background: var(--aero-red);
        }

        .btn-ghost {
            background: transparent;
            color: var(--green-900);
            border: 1.5px solid var(--green-900);
        }

        .btn-row {
            display: flex;
            gap: 8px;
        }

        .btn-row .btn {
            margin-top: 8px;
        }

        /* ---------- Edit form ---------- */
        .field {
            margin-bottom: 12px;
        }

        .field label {
            display: block;
            font-size: 13px;
            color: var(--ink-2);
            margin-bottom: 5px;
        }

        .field select,
        .field textarea,
        .field input {
            width: 100%;
            padding: 11px 12px;
            font-size: 15px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--card);
            color: var(--ink);
            font-family: inherit;
        }

        .field select:focus,
        .field textarea:focus,
        .field input:focus {
            outline: 2px solid var(--green-700);
            border-color: transparent;
        }

        /* ---------- History ---------- */
        .log-item {
            display: flex;
            gap: 10px;
            padding: 10px 0;
            border-bottom: 1px solid var(--line);
            align-items: flex-start;
        }

        .log-item:last-child {
            border-bottom: 0;
        }

        .log-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            margin-top: 6px;
            flex-shrink: 0;
        }

        .log-body {
            flex: 1;
            min-width: 0;
        }

        .log-body p {
            font-size: 14px;
            font-weight: 500;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .log-body span {
            font-size: 12px;
            color: var(--ink-3);
        }

        /* ---------- Bottom nav ---------- */
        nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            display: flex;
            background: var(--card);
            border-top: 1px solid var(--line);
            padding-bottom: env(safe-area-inset-bottom);
        }

        nav button {
            flex: 1;
            padding: 9px 0 7px;
            border: 0;
            background: none;
            font-size: 11px;
            color: var(--ink-3);
            cursor: pointer;
            font-family: inherit;
        }

        nav button svg {
            display: block;
            margin: 0 auto 2px;
            width: 22px;
            height: 22px;
            stroke: currentColor;
            fill: none;
            stroke-width: 1.8;
        }

        nav button.active {
            color: var(--green-900);
            font-weight: 600;
        }

        .empty {
            text-align: center;
            color: var(--ink-3);
            font-size: 14px;
            padding: 40px 0;
        }

        .toast {
            position: fixed;
            left: 50%;
            bottom: 90px;
            transform: translateX(-50%);
            background: var(--ink);
            color: #fff;
            font-size: 13px;
            padding: 10px 18px;
            border-radius: 99px;
            opacity: 0;
            transition: opacity .25s;
            pointer-events: none;
            z-index: 50;
            max-width: 90vw;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
        }

        .spinner {
            width: 22px;
            height: 22px;
            margin: 0 auto;
            border: 3px solid var(--line);
            border-top-color: var(--green-900);
            border-radius: 50%;
            animation: spin .8s linear infinite;
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>Asset Scanner</h1>
        <p id="header-sub">โหลดข้อมูล...</p>
    </header>

    <main>
        <!-- ============ SCREEN: SCAN ============ -->
        <section id="screen-scan" class="screen active">
            <div id="video-wrap">
                <video id="video" playsinline muted></video>
                <div class="scan-frame"><b></b></div>
                <p id="video-hint">จ่อ barcode ให้ชัดในกรอบ แล้วกดปุ่มสแกน</p>
            </div>
            <button id="capture-btn" class="btn btn-primary" style="margin:0 0 12px;" onclick="captureScan()">📷 สแกน
                Barcode</button>
            <div class="manual-row">
                <input id="manual-input" type="text" placeholder="หรือพิมพ์ Asset No. / S/N เอง" autocomplete="off">
                <button class="btn btn-primary" style="width:auto;margin:0;padding:0 18px;"
                    onclick="manualSearch()">ค้นหา</button>
            </div>
            <div id="scan-result"></div>
        </section>

        <!-- ============ SCREEN: DETAIL ============ -->
        <section id="screen-detail" class="screen">
            <div id="detail-body"></div>
        </section>

        <!-- ============ SCREEN: EDIT ============ -->
        <section id="screen-edit" class="screen">
            <div class="card">
                <h2>แก้ไขข้อมูล Asset</h2>
                <div class="field">
                    <label>Asset No.</label>
                    <input id="edit-asset" type="text" placeholder="เช่น 1174032510000">
                </div>
                <div class="field">
                    <label>สถานะอุปกรณ์</label>
                    <select id="edit-status">
                        <option value="ใช้งานปกติ">ใช้งานปกติ</option>
                        <option value="ชำรุด">ชำรุด</option>
                        <option value="รอซ่อม">รอซ่อม</option>
                        <option value="รอตัดจำหน่าย">รอตัดจำหน่าย</option>
                        <option value="จำหน่ายออก">จำหน่ายออก</option>
                    </select>
                </div>
                <div class="field">
                    <label>Site</label>
                    <select id="edit-site" onchange="fillRoomOptions()"></select>
                </div>
                <div class="field">
                    <label>ห้อง / ตำแหน่งที่ตั้ง <span id="room-hint" style="color:var(--ink-3)"></span></label>
                    <select id="edit-room-select" onchange="onRoomSelect()" style="display:none"></select>
                    <input id="edit-room" type="text" placeholder="เช่น Server Room 1">
                </div>
                <div class="field">
                    <label>Rack</label>
                    <select id="edit-rack-select" onchange="onRackSelect('edit')" style="display:none"></select>
                    <input id="edit-rack" type="text" placeholder="None">
                </div>
                <div class="field">
                    <label>หมายเหตุ</label>
                    <textarea id="edit-note" rows="3" placeholder="บันทึกเพิ่มเติม..."></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn btn-ghost" onclick="showScreen('detail')">ยกเลิก</button>
                    <button class="btn btn-primary" id="save-btn" onclick="saveEdit()">บันทึก</button>
                </div>
            </div>
        </section>

        <!-- ============ SCREEN: ADD NEW ============ -->
        <section id="screen-add" class="screen">
            <div class="card">
                <h2>เพิ่ม Asset ใหม่</h2>
                <div class="field">
                    <label>Asset No.</label>
                    <input id="add-asset" type="text" placeholder="เลขจาก barcode">
                </div>
                <div class="field">
                    <label>Serial Number</label>
                    <input id="add-sn" type="text" placeholder="เช่น FOC1751S1XG">
                </div>
                <div class="field">
                    <label>รายการอุปกรณ์</label>
                    <input id="add-detail" type="text" placeholder="เช่น CISCO CATALYST 2960">
                </div>
                <div class="field">
                    <label>Application</label>
                    <input id="add-app" type="text" placeholder="เช่น CMAL2CBMOP22">
                </div>
                <div class="field">
                    <label>Site</label>
                    <select id="add-site" onchange="addFillRooms()"></select>
                </div>
                <div class="field">
                    <label>ห้อง / ตำแหน่งที่ตั้ง</label>
                    <select id="add-room-select" onchange="onAddRoomSelect()" style="display:none"></select>
                    <input id="add-room" type="text" placeholder="เช่น Server Room 1">
                </div>
                <div class="field">
                    <label>Rack</label>
                    <select id="add-rack-select" onchange="onRackSelect('add')" style="display:none"></select>
                    <input id="add-rack" type="text" placeholder="None">
                </div>
                <div class="field">
                    <label>สถานะอุปกรณ์</label>
                    <select id="add-status">
                        <option value="ใช้งานปกติ">ใช้งานปกติ</option>
                        <option value="ชำรุด">ชำรุด</option>
                        <option value="รอซ่อม">รอซ่อม</option>
                        <option value="รอตัดจำหน่าย">รอตัดจำหน่าย</option>
                        <option value="จำหน่ายออก">จำหน่ายออก</option>
                    </select>
                </div>
                <div class="field">
                    <label>หมายเหตุ</label>
                    <textarea id="add-note" rows="2" placeholder="บันทึกเพิ่มเติม..."></textarea>
                </div>
                <div class="btn-row">
                    <button class="btn btn-ghost" onclick="showScreen('scan')">ยกเลิก</button>
                    <button class="btn btn-primary" id="add-save-btn" onclick="saveNewAsset()">เพิ่ม Asset</button>
                </div>
            </div>
        </section>

        <!-- ============ SCREEN: LIST ============ -->
        <section id="screen-list" class="screen">
            <div class="manual-row">
                <input id="list-filter" type="text" placeholder="กรองรายการ..." oninput="renderList(this.value)">
            </div>
            <div id="list-body" class="card"></div>
        </section>

        <!-- ============ SCREEN: HISTORY ============ -->
        <section id="screen-history" class="screen">
            <div class="card">
                <h2>ประวัติการตรวจสอบ (เครื่องนี้)</h2>
                <div id="history-body"></div>
            </div>
        </section>
    </main>

    <!-- ============ BOTTOM NAV ============ -->
    <nav>
        <button id="nav-scan" class="active" onclick="showScreen('scan')">
            <svg viewBox="0 0 24 24">
                <path
                    d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2M7 12h10" />
            </svg>
            สแกน
        </button>
        <button id="nav-list" onclick="showScreen('list')">
            <svg viewBox="0 0 24 24">
                <path d="M8 6h13M8 12h13M8 18h13M3 6h.01M3 12h.01M3 18h.01" />
            </svg>
            รายการ
        </button>
        <button id="nav-history" onclick="showScreen('history')">
            <svg viewBox="0 0 24 24">
                <path d="M12 8v4l3 3M3.05 11a9 9 0 11.5 4" />
                <path d="M3 5v6h6" />
            </svg>
            ประวัติ
        </button>
    </nav>

    <div id="toast" class="toast"></div>

    <script src="https://unpkg.com/@zxing/library@0.21.3/umd/index.min.js"></script>
    <script>
        /* ================================================================
           CONFIG — แก้ 2 ค่านี้ก่อนใช้งาน
           ================================================================ */
        const SHEET_ID = "1d426tLoj0aZ3ViVFuzQCbAGUdibegsrueTidV3eqkCA";   // จาก URL ของ Google Sheets
        const SHEET_NAME = "Assets";                           // ชื่อแท็บใน Sheet
        const ROOMS_NAME = "Rooms";                            // แท็บ master ห้อง (site_id, room_name) — ไม่มีก็ได้
        const RACKS_NAME = "Racks";                            // แท็บ master rack (site_id, room_name, rack_name) — ไม่มีก็ได้
        const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwbCiq0nwkdmIqtQVgwrlb1uxJq9uJ2rGbwniMrVNpGcpvbA9TYQhZkx8fLznGEiOA/exec";    // Web App URL จาก Apps Script (สำหรับบันทึก)

        /* ชื่อคอลัมน์ในแท็บ Assets — แก้ฝั่งขวาให้ตรงกับ header ใน Sheet ของคุณ */
        const COLS = {
            asset: "asset",           // เลข asset (ใช้เป็น key หลัก)
            site: "site_id",         // รหัส site เช่น CTR, LPN
            detail: "detail",          // รายการอุปกรณ์
            sn: "serial_number",   // Serial Number
            app: "application",     // Application
            room: "room",            // ห้อง (ผูกกับ Rooms.room_name)
            rack: "rack",            // rack ในห้อง (ผูกกับ Racks.rack_name) — default None
            status: "status",          // สถานะอุปกรณ์
            note: "note",            // หมายเหตุ
        };
        /* ================================================================ */

        let assets = [];          // ข้อมูลทั้งหมดจาก Google Sheets
        let rooms = [];           // master ห้อง: [{site_id, room_name}, ...]
        let racks = [];           // master rack: [{site_id, room_name, rack_name}, ...]
        let current = null;       // asset ที่กำลังดูอยู่
        let codeReader = null;
        let scanning = false;

        /* ---------- ดึงข้อมูลแท็บใดๆ จาก Google Sheets (gviz JSON, sheet ต้อง public read) ---------- */
        async function fetchSheet(sheetName) {
            // headers=1 บังคับให้แถวแรกเป็น header เสมอ (กัน gviz เดา header ผิด)
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&headers=1&sheet=${encodeURIComponent(sheetName)}`;
            const res = await fetch(url);
            const text = await res.text();
            // gviz ห่อ JSON ด้วย function call — ตัดหัวท้ายออก
            const json = JSON.parse(text.substring(text.indexOf("{"), text.lastIndexOf("}") + 1));
            const cols = json.table.cols.map(c => (c.label || c.id || "").trim());
            return json.table.rows.map(r => {
                const obj = {};
                cols.forEach((c, i) => obj[c] = r.c[i] ? String(r.c[i].v ?? "").trim() : "");
                return obj;
            });
        }

        async function loadAssets() {
            const sub = document.getElementById("header-sub");
            try {
                // remap header จาก Sheet → key ภายในแอป (Asset, Site_Id, ...)
                const raw = await fetchSheet(SHEET_NAME);
                assets = raw.map(r => ({
                    "Asset": r[COLS.asset] ?? "",
                    "Site_Id": r[COLS.site] ?? "",
                    "รายการอุปกรณ์": r[COLS.detail] ?? "",
                    "S/N": r[COLS.sn] ?? "",
                    "Application": r[COLS.app] ?? "",
                    "Room": r[COLS.room] ?? "",
                    "Rack": r[COLS.rack] ?? "",
                    "Status": r[COLS.status] ?? "",
                    "Note": r[COLS.note] ?? "",
                })).filter(a => a["Asset"] || a["S/N"]);
                sub.textContent = `${assets.length} รายการ · อัปเดต ${new Date().toLocaleTimeString("th-TH", { hour: "2-digit", minute: "2-digit" })}`;
                try { localStorage.setItem("assets_cache", JSON.stringify(assets)); } catch (e) { }
            } catch (err) {
                // offline → ใช้ cache
                try {
                    const cached = localStorage.getItem("assets_cache");
                    if (cached) {
                        assets = JSON.parse(cached);
                        sub.textContent = `${assets.length} รายการ (ออฟไลน์ — ข้อมูล cache)`;
                        return;
                    }
                } catch (e) { }
                sub.textContent = "โหลดข้อมูลไม่ได้ — ตรวจสอบ SHEET_ID และการแชร์";
            }
        }

        /* ---------- โหลด master ห้อง (แท็บ Rooms: site_id, room_name) — ไม่มีแท็บนี้ก็ข้าม ---------- */
        async function loadRooms() {
            try {
                rooms = (await fetchSheet(ROOMS_NAME)).filter(r => r["site_id"] && r["room_name"]);
                try { localStorage.setItem("rooms_cache", JSON.stringify(rooms)); } catch (e) { }
            } catch (err) {
                try { rooms = JSON.parse(localStorage.getItem("rooms_cache") || "[]"); } catch (e) { rooms = []; }
            }
        }

        /* ---------- รายชื่อห้องของ site หนึ่งๆ ---------- */
        function roomsOfSite(siteId) {
            return rooms
                .filter(r => (r["site_id"] || "").toLowerCase() === (siteId || "").toLowerCase())
                .map(r => r["room_name"]);
        }

        /* ---------- โหลด master rack (แท็บ Racks: site_id, room_name, rack_name) — ไม่มีแท็บนี้ก็ข้าม ---------- */
        async function loadRacks() {
            try {
                racks = (await fetchSheet(RACKS_NAME)).filter(r => r["site_id"] && r["room_name"] && r["rack_name"]);
                try { localStorage.setItem("racks_cache", JSON.stringify(racks)); } catch (e) { }
            } catch (err) {
                try { racks = JSON.parse(localStorage.getItem("racks_cache") || "[]"); } catch (e) { racks = []; }
            }
        }

        /* ---------- รายชื่อ rack ของ site+ห้อง ---------- */
        function racksOf(siteId, roomName) {
            return racks
                .filter(r =>
                    (r["site_id"] || "").toLowerCase() === (siteId || "").toLowerCase() &&
                    (r["room_name"] || "").toLowerCase() === (roomName || "").toLowerCase())
                .map(r => r["rack_name"]);
        }

        /* ---------- ค้นหา asset จาก barcode / ข้อความ ----------
           normalize: ตัดขีด/จุด/ช่องว่างออกก่อนเทียบ
           เช่น label "1-174-03253-0000" จะ match กับ "1174032530000" ใน Sheet */
        function norm(s) {
            return String(s ?? "").replace(/[^0-9a-z]/gi, "").toLowerCase();
        }
        function findAsset(code) {
            const all = findAssetsAll(code);
            return all.length ? all[0] : null;
        }

        /* หา "ทุกตัว" ที่ตรง — เลข asset ซ้ำกันได้ (ตัวเก่ารอตัดจำหน่าย / ตัวใหม่ใช้เลขเดิม) */
        function findAssetsAll(code) {
            const c = norm(code);
            if (!c) return [];
            const exact = assets.filter(a => norm(a["Asset"]) === c || norm(a["S/N"]) === c);
            if (exact.length) return exact;
            if (c.length >= 4)
                return assets.filter(a => norm(a["Asset"]).includes(c) || norm(a["S/N"]).includes(c));
            return [];
        }

        /* ---------- แสดงผลลัพธ์บนหน้าสแกน ---------- */
        let scanMatches = [];

        function siteLoc(a) {
            const parts = [];
            if (a["Room"]) parts.push(a["Room"]);
            if (a["Rack"] && a["Rack"] !== "None") parts.push(a["Rack"]);
            return esc(a["Site_Id"]) + (parts.length ? ` (${esc(parts.join(" / "))})` : "");
        }

        function showResult(code) {
            const box = document.getElementById("scan-result");
            const matches = findAssetsAll(code);
            lastNotFound = code;   // เก็บ code ไว้ prefill ปุ่มเพิ่ม ทุกกรณี

            if (matches.length === 1) {
                const hit = matches[0];
                current = hit;
                if (navigator.vibrate) navigator.vibrate(80);
                box.innerHTML = `
      <div class="card" style="border-color:var(--green-700);">
        <div class="frow"><span class="k">Asset No.</span><span class="v" style="color:var(--green-900)">${esc(hit["Asset"])}</span></div>
        <div class="frow"><span class="k">รายการ</span><span class="v">${esc(hit["รายการอุปกรณ์"])}</span></div>
        <div class="frow"><span class="k">S/N</span><span class="v">${esc(hit["S/N"] || "-")}</span></div>
        <div class="frow"><span class="k">Site</span><span class="v">${siteLoc(hit)}</span></div>
        <div class="frow"><span class="k">สถานะ</span>${statusBadge(hit["Status"] || "พบข้อมูล")}</div>
        <button class="btn btn-primary" onclick="openDetail()">ดูรายละเอียด</button>
        <button class="btn btn-ghost" onclick="openAdd()">➕ เพิ่มเครื่องใหม่ใช้เลขนี้ (ทดแทนตัวเดิม)</button>
      </div>`;
            } else if (matches.length > 1) {
                // เลข asset ซ้ำได้ (ตัวเก่ารอตัดจำหน่าย / ตัวใหม่ใช้เลขเดิม) → ให้เลือกตัวที่ต้องการ
                scanMatches = matches;
                if (navigator.vibrate) navigator.vibrate(80);
                box.innerHTML = `
      <div class="card" style="border-color:var(--green-700);">
        <h2>พบ ${matches.length} รายการ — เลือกตัวที่ต้องการ</h2>
        ${matches.map((a, i) => `
          <div class="log-item" style="cursor:pointer" onclick="openMatch(${i})">
            <div class="log-body">
              <p>${esc(a["รายการอุปกรณ์"] || "(ไม่มีชื่อรายการ)")}</p>
              <span>S/N: ${esc(a["S/N"] || "-")} · ${siteLoc(a)}</span>
            </div>
            ${statusBadge(a["Status"] || "-").replace('class="v"', 'class="v" style="margin-left:auto;flex-shrink:0;"')}
          </div>`).join("")}
        <button class="btn btn-ghost" onclick="openAdd()">➕ เพิ่มเครื่องใหม่ใช้เลขนี้ (ทดแทนตัวเดิม)</button>
      </div>`;
            } else {
                lastNotFound = code;
                box.innerHTML = `
      <div class="card" style="border-color:var(--red-700);">
        <div class="frow"><span class="k">Code ที่สแกนได้</span><span class="v">${esc(code)}</span></div>
        <div class="frow"><span class="k">สถานะ</span><span class="v"><span class="badge err">ไม่พบในทะเบียน</span></span></div>
        <button class="btn btn-primary" onclick="openAdd()">➕ เพิ่ม Asset ใหม่ด้วยเลขนี้</button>
        <p style="font-size:12px;color:var(--ink-3);margin-top:8px;text-align:center;">
          หรือถ้ารู้ S/N ลองพิมพ์ค้นหาด้านบน — เจอแล้วกด "แก้ไข" เพื่อใส่เลข asset ได้
        </p>
      </div>`;
            }
        }

        function openMatch(i) {
            if (scanMatches[i]) { current = scanMatches[i]; openDetail(); }
        }

        function manualSearch() {
            const v = document.getElementById("manual-input").value;
            if (v.trim()) showResult(v);
        }

        /* ---------- หน้ารายละเอียด ---------- */
        function statusBadge(status) {
            const s = status || "";
            if (!s || s === "-") return `<span class="v">-</span>`;
            const cls = (s === "ใช้งานปกติ" || s === "พบข้อมูล") ? "ok"
                : (s === "จำหน่ายออก") ? "err" : "warn";
            return `<span class="v"><span class="badge ${cls}">${esc(s)}</span></span>`;
        }

        /* หาการตรวจสอบล่าสุดของ asset นี้จาก log ในเครื่อง */
        function lastCheckOf(assetNo) {
            try {
                const logs = JSON.parse(localStorage.getItem("audit_log") || "[]");
                return logs.find(l => l.asset === assetNo && l.action === "ตรวจสอบ") || null;
            } catch (e) { return null; }
        }

        function openDetail() {
            if (!current) return;
            const a = current;
            const last = lastCheckOf(a["Asset"]);
            const lastHtml = last
                ? `<div class="frow"><span class="k">ตรวจสอบล่าสุด</span><span class="v">${new Date(last.t).toLocaleString("th-TH")}</span></div>`
                : `<div class="frow"><span class="k">ตรวจสอบล่าสุด</span><span class="v"><span class="badge warn">ยังไม่เคยตรวจ (เครื่องนี้)</span></span></div>`;
            document.getElementById("detail-body").innerHTML = `
    <div class="card">
      <h2>ข้อมูลอุปกรณ์</h2>
      <div class="frow"><span class="k">Asset No.</span><span class="v">${esc(a["Asset"])}</span></div>
      <div class="frow"><span class="k">รายการ</span><span class="v">${esc(a["รายการอุปกรณ์"])}</span></div>
      <div class="frow"><span class="k">S/N</span><span class="v">${esc(a["S/N"])}</span></div>
      <div class="frow"><span class="k">Application</span><span class="v">${esc(a["Application"])}</span></div>

      <div class="frow"><span class="k">สถานะ</span>${statusBadge(a["Status"])}</div>
      <div class="frow"><span class="k">หมายเหตุ</span><span class="v">${esc(a["Note"] || "-")}</span></div>
      ${lastHtml}
    </div>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="openEdit()">แก้ไข</button>
      <button class="btn btn-primary" id="check-btn" onclick="checkAsset()">ตรวจสอบแล้ว ✓</button>
    </div>
    <button class="btn btn-ghost" onclick="showScreen('scan')">← กลับไปสแกน</button>`;
            showScreen("detail");
        }

        /* ---------- หน้าแก้ไข ---------- */
        function openEdit() {
            if (!current) return;
            document.getElementById("edit-asset").value = current["Asset"] || "";
            document.getElementById("edit-status").value = current["Status"] || "ใช้งานปกติ";
            document.getElementById("edit-note").value = current["Note"] || "";

            // Site dropdown: รวม site จาก master Rooms + จากข้อมูล assets
            const siteSel = document.getElementById("edit-site");
            const sites = [...new Set([
                ...rooms.map(r => r["site_id"]),
                ...assets.map(a => a["Site_Id"]),
            ].filter(Boolean))].sort();
            siteSel.innerHTML = sites.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join("");
            siteSel.value = current["Site_Id"] || sites[0] || "";

            fillRoomOptions(current["Room"] || "");
            fillRackOptions("edit", current["Rack"] || "None");
            showScreen("edit");
        }

        /* ---------- Cascading dropdown: Site → ห้อง ---------- */
        function fillRoomOptions(preselect) {
            const site = document.getElementById("edit-site").value;
            const roomSel = document.getElementById("edit-room-select");
            const roomInput = document.getElementById("edit-room");
            const hint = document.getElementById("room-hint");
            const list = roomsOfSite(site);

            if (list.length) {
                // มี master ห้องของ site นี้ → ใช้ dropdown, มีตัวเลือก "อื่นๆ" ให้พิมพ์เอง
                roomSel.innerHTML =
                    list.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join("") +
                    `<option value="__other__">อื่นๆ (พิมพ์เอง)</option>`;
                roomSel.style.display = "";
                const cur = preselect ?? roomInput.value;
                if (cur && list.includes(cur)) {
                    roomSel.value = cur;
                    roomInput.style.display = "none";
                    roomInput.value = cur;
                } else if (cur) {
                    roomSel.value = "__other__";
                    roomInput.style.display = "";
                    roomInput.value = cur;
                } else {
                    roomSel.value = list[0];
                    roomInput.style.display = "none";
                    roomInput.value = list[0];
                }
                hint.textContent = `(กรองตาม ${site})`;
            } else {
                // ไม่มี master → ใช้ช่องพิมพ์อย่างเดียว
                roomSel.style.display = "none";
                roomInput.style.display = "";
                if (typeof preselect === "string") roomInput.value = preselect;
                hint.textContent = rooms.length ? `(ไม่มีห้องใน master สำหรับ ${site})` : "";
            }
            fillRackOptions("edit");
        }

        function onRoomSelect() {
            const roomSel = document.getElementById("edit-room-select");
            const roomInput = document.getElementById("edit-room");
            if (roomSel.value === "__other__") {
                roomInput.style.display = "";
                roomInput.value = "";
                roomInput.focus();
            } else {
                roomInput.style.display = "none";
                roomInput.value = roomSel.value;
            }
            fillRackOptions("edit");
        }

        /* ---------- Cascading dropdown: Site+ห้อง → Rack (default None) ---------- */
        function fillRackOptions(prefix, preselect) {
            const site = document.getElementById(prefix + "-site").value;
            const room = document.getElementById(prefix + "-room").value;
            const rackSel = document.getElementById(prefix + "-rack-select");
            const rackInput = document.getElementById(prefix + "-rack");
            const list = racksOf(site, room);

            if (list.length) {
                rackSel.innerHTML =
                    `<option value="None">None</option>` +
                    list.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join("") +
                    `<option value="__other__">อื่นๆ (พิมพ์เอง)</option>`;
                rackSel.style.display = "";
                const cur = preselect ?? rackInput.value;
                if (cur && (cur === "None" || list.includes(cur))) {
                    rackSel.value = cur;
                    rackInput.style.display = "none";
                    rackInput.value = cur;
                } else if (cur) {
                    rackSel.value = "__other__";
                    rackInput.style.display = "";
                    rackInput.value = cur;
                } else {
                    rackSel.value = "None";
                    rackInput.style.display = "none";
                    rackInput.value = "None";
                }
            } else {
                rackSel.style.display = "none";
                rackInput.style.display = "";
                rackInput.value = (typeof preselect === "string" && preselect) ? preselect : (rackInput.value || "None");
            }
        }

        function onRackSelect(prefix) {
            const rackSel = document.getElementById(prefix + "-rack-select");
            const rackInput = document.getElementById(prefix + "-rack");
            if (rackSel.value === "__other__") {
                rackInput.style.display = "";
                rackInput.value = "";
                rackInput.focus();
            } else {
                rackInput.style.display = "none";
                rackInput.value = rackSel.value;
            }
        }

        /* ---------- เพิ่ม Asset ใหม่ (จากการสแกนไม่เจอ) ---------- */
        let lastNotFound = "";

        function openAdd() {
            // prefill เลขที่สแกนได้ (ตัดขีด/ช่องว่างออก)
            document.getElementById("add-asset").value = (lastNotFound || "").replace(/[^0-9A-Za-z]/g, "");
            document.getElementById("add-sn").value = "";
            document.getElementById("add-detail").value = "";
            document.getElementById("add-app").value = "";
            document.getElementById("add-status").value = "ใช้งานปกติ";
            document.getElementById("add-note").value = "";

            const siteSel = document.getElementById("add-site");
            const sites = [...new Set([
                ...rooms.map(r => r["site_id"]),
                ...assets.map(a => a["Site_Id"]),
            ].filter(Boolean))].sort();
            siteSel.innerHTML = sites.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join("");
            addFillRooms();
            showScreen("add");
        }

        function addFillRooms() {
            const site = document.getElementById("add-site").value;
            const roomSel = document.getElementById("add-room-select");
            const roomInput = document.getElementById("add-room");
            const list = roomsOfSite(site);
            if (list.length) {
                roomSel.innerHTML =
                    list.map(r => `<option value="${esc(r)}">${esc(r)}</option>`).join("") +
                    `<option value="__other__">อื่นๆ (พิมพ์เอง)</option>`;
                roomSel.style.display = "";
                roomSel.value = list[0];
                roomInput.style.display = "none";
                roomInput.value = list[0];
            } else {
                roomSel.style.display = "none";
                roomInput.style.display = "";
                roomInput.value = "";
            }
            fillRackOptions("add", "None");
        }

        function onAddRoomSelect() {
            const roomSel = document.getElementById("add-room-select");
            const roomInput = document.getElementById("add-room");
            if (roomSel.value === "__other__") {
                roomInput.style.display = "";
                roomInput.value = "";
                roomInput.focus();
            } else {
                roomInput.style.display = "none";
                roomInput.value = roomSel.value;
            }
            fillRackOptions("add", "None");
        }

        async function saveNewAsset() {
            const asset = document.getElementById("add-asset").value.trim();
            const sn = document.getElementById("add-sn").value.trim();
            if (!asset && !sn) { toast("ต้องมี Asset No. หรือ S/N อย่างน้อย 1 อย่าง"); return; }

            // เลข asset ซ้ำได้ (ตัวใหม่มาแทนตัวเก่าที่รอตัดจำหน่าย) — แต่เตือนให้ยืนยันก่อน
            if (asset) {
                const dup = assets.filter(a => norm(a["Asset"]) === norm(asset));
                if (dup.length) {
                    const info = dup.map(d => `• ${d["รายการอุปกรณ์"] || "?"} (${d["Status"] || "ไม่ระบุสถานะ"})`).join("\n");
                    if (!confirm(`เลข asset นี้มีอยู่แล้ว ${dup.length} รายการ:\n${info}\n\nเพิ่มเป็นรายการใหม่ (เครื่องทดแทน) ใช่ไหม?\nแนะนำ: เปลี่ยนสถานะตัวเก่าเป็น "รอตัดจำหน่าย" ด้วย`)) return;
                }
            }
            // S/N ต้องไม่ซ้ำ — คนละเครื่องกันย่อมมี S/N ต่างกัน
            if (sn && assets.some(a => norm(a["S/N"]) === norm(sn))) {
                toast("S/N นี้มีอยู่แล้วในทะเบียน — ลองค้นหาดูก่อน");
                return;
            }

            const payload = {
                action: "add",
                asset: asset,
                sn: sn,
                detail: document.getElementById("add-detail").value.trim(),
                app: document.getElementById("add-app").value.trim(),
                site: document.getElementById("add-site").value,
                room: document.getElementById("add-room").value.trim(),
                rack: document.getElementById("add-rack").value.trim() || "None",
                status: document.getElementById("add-status").value,
                note: document.getElementById("add-note").value,
                user: getUser(),
            };
            const btn = document.getElementById("add-save-btn");
            btn.disabled = true;
            const origLabel = btn.textContent;
            btn.textContent = "⏳ กำลังบันทึก...";   // รอ Apps Script ตอบ (ปกติ 1-3 วิ)
            await postToSheet(payload, "เพิ่ม Asset แล้ว ✓", () => {
                const obj = {
                    "Asset": asset, "Site_Id": payload.site, "รายการอุปกรณ์": payload.detail,
                    "S/N": sn, "Application": payload.app, "Room": payload.room,
                    "Rack": payload.rack, "Status": payload.status, "Note": payload.note,
                };
                assets.push(obj);
                current = obj;
                addLocalLog("เพิ่ม", obj);
                openDetail();
            });
            btn.disabled = false;
            btn.textContent = origLabel;
        }

        async function saveEdit() {
            if (!current) return;
            const newAsset = document.getElementById("edit-asset").value.trim();
            const payload = {
                action: "update",
                key: current["Asset"],   // เลข asset เดิม — ใช้หาแถวใน Sheet
                sn: current["S/N"],     // สำรอง: หาแถวด้วย S/N (กรณี asset เดิมว่าง/ซ้ำ)
                asset: newAsset,           // เลข asset ใหม่ (แก้ได้)
                site: document.getElementById("edit-site").value,
                status: document.getElementById("edit-status").value,
                room: document.getElementById("edit-room").value.trim(),
                rack: document.getElementById("edit-rack").value.trim() || "None",
                note: document.getElementById("edit-note").value,
                user: getUser(),
            };
            const btn = document.getElementById("save-btn");
            const origLabel = btn ? btn.textContent : "";
            if (btn) { btn.disabled = true; btn.textContent = "⏳ กำลังบันทึกข้อมูล..."; }
            await postToSheet(payload, "บันทึกแล้ว ✓", () => {
                current["Asset"] = newAsset;
                current["Site_Id"] = payload.site;
                current["Status"] = payload.status;
                current["Room"] = payload.room;
                current["Rack"] = payload.rack;
                current["Note"] = payload.note;
                addLocalLog("แก้ไข", current);
                openDetail();
            });
            if (btn) { btn.disabled = false; btn.textContent = origLabel; }
        }

        /* ---------- ปุ่มตรวจสอบแล้ว ---------- */
        async function checkAsset() {
            if (!current) return;
            const btn = document.getElementById("check-btn");
            const origLabel = btn ? btn.textContent : "";
            if (btn) { btn.disabled = true; btn.textContent = "⏳ กำลังแก้สถานะการตรวจสอบ..."; }
            const payload = { action: "check", asset: current["Asset"], user: getUser() };
            await postToSheet(payload, "บันทึกการตรวจสอบแล้ว ✓", () => {
                addLocalLog("ตรวจสอบ", current);
                openDetail();   // วาดหน้าใหม่ให้ "ตรวจสอบล่าสุด" อัปเดตทันที
            });
            const btn2 = document.getElementById("check-btn");
            if (btn2) { btn2.disabled = false; btn2.textContent = origLabel || "ตรวจสอบแล้ว ✓"; }
        }

        /* ---------- ส่งข้อมูลไป Apps Script ---------- */
        async function postToSheet(payload, okMsg, onOk) {
            if (SCRIPT_URL.startsWith("PUT_")) {
                toast("ยังไม่ได้ตั้งค่า SCRIPT_URL — บันทึกเฉพาะในเครื่อง");
                if (onOk) onOk();
                return;
            }
            const btn = document.getElementById("save-btn");
            if (btn) btn.disabled = true;
            try {
                // ใช้ text/plain เพื่อเลี่ยง CORS preflight (Apps Script รองรับ)
                await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload), headers: { "Content-Type": "text/plain" } });
                toast(okMsg);
                if (onOk) onOk();
            } catch (err) {
                toast("ส่งข้อมูลไม่สำเร็จ — ลองใหม่อีกครั้ง");
            } finally {
                if (btn) btn.disabled = false;
            }
        }

        /* ---------- Local audit log ---------- */
        function addLocalLog(action, a) {
            try {
                const logs = JSON.parse(localStorage.getItem("audit_log") || "[]");
                logs.unshift({ t: Date.now(), action, asset: a["Asset"], name: a["รายการอุปกรณ์"], site: a["Site_Id"] });
                localStorage.setItem("audit_log", JSON.stringify(logs.slice(0, 200)));
            } catch (e) { }
        }

        function renderHistory() {
            const box = document.getElementById("history-body");
            let logs = [];
            try { logs = JSON.parse(localStorage.getItem("audit_log") || "[]"); } catch (e) { }
            if (!logs.length) { box.innerHTML = `<p class="empty">ยังไม่มีประวัติ</p>`; return; }
            box.innerHTML = logs.map(l => `
    <div class="log-item">
      <div class="log-dot" style="background:${l.action === "แก้ไข" ? "#d97706" : l.action === "เพิ่ม" ? "#2563eb" : "#15803d"}"></div>
      <div class="log-body">
        <p>${esc(l.action)}: ${esc(l.name || l.asset)}</p>
        <span>${new Date(l.t).toLocaleString("th-TH")} · ${esc(l.site || "")}</span>
      </div>
    </div>`).join("");
        }

        /* ---------- หน้ารายการทั้งหมด (แสดงครบทุกรายการ) ---------- */
        let listFiltered = [];   // ผลการกรองล่าสุด (ใช้อ้างอิงตอนกดเปิดรายการ)

        function listItemHtml(a, idx) {
            return `
    <div class="log-item" style="cursor:pointer" onclick="openFromListIdx(${idx})">
      <div class="log-body">
        <p>${esc(a["รายการอุปกรณ์"] || "(ไม่มีชื่อรายการ)")}</p>
        <span>${esc(a["Asset"] || "ไม่มีเลข asset")} · ${esc(a["Site_Id"])}</span>
      </div>
    </div>`;
        }

        function renderList(filter) {
            const box = document.getElementById("list-body");
            const f = (filter || "").toLowerCase();
            listFiltered = assets.filter(a =>
                !f || Object.values(a).some(v => String(v).toLowerCase().includes(f))
            );
            if (!listFiltered.length) { box.innerHTML = `<p class="empty">ไม่พบรายการ</p>`; return; }
            box.innerHTML =
                listFiltered.map((a, i) => listItemHtml(a, i)).join("") +
                `<p class="empty" style="padding:14px 0;">ทั้งหมด ${listFiltered.length} รายการ</p>`;
        }

        function openFromListIdx(idx) {
            const hit = listFiltered[idx];
            if (hit) { current = hit; openDetail(); }
        }

        /* ---------- Barcode Scanner (ZXing) — เปิดกล้องแบบเดิม, decode เฉพาะตอนกดปุ่มถ่าย ---------- */
        let cameraStream = null;

        async function startScanner() {
            if (scanning) return;
            try {
                // จำกัด format ให้ตรงกับ label จริง (ยืนยันแล้วว่าเป็น CODE 93) → decode แม่นและเร็วขึ้นมาก
                const hints = new Map();
                hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
                    ZXing.BarcodeFormat.CODE_93,
                    ZXing.BarcodeFormat.CODE_128,
                    ZXing.BarcodeFormat.CODE_39,
                    ZXing.BarcodeFormat.QR_CODE,
                ]);
                hints.set(ZXing.DecodeHintType.TRY_HARDER, true);
                codeReader = new ZXing.BrowserMultiFormatReader(hints);
                const devices = await codeReader.listVideoInputDevices();
                // เลือกกล้องหลัง (มักเป็นตัวสุดท้าย หรือชื่อมี back/rear)
                let deviceId = devices.length ? devices[devices.length - 1].deviceId : null;
                const back = devices.find(d => /back|rear|environment/i.test(d.label));
                if (back) deviceId = back.deviceId;

                // เปิดกล้องแสดง preview อย่างเดียว — ขอความละเอียดสูง เพราะ decode จากภาพนิ่งต้องการภาพคม
                cameraStream = await navigator.mediaDevices.getUserMedia({
                    video: Object.assign(
                        deviceId ? { deviceId: { exact: deviceId } } : { facingMode: "environment" },
                        { width: { ideal: 1920 }, height: { ideal: 1080 } }
                    )
                });
                const video = document.getElementById("video");
                video.srcObject = cameraStream;
                await video.play();
                scanning = true;
                document.getElementById("video-hint").textContent = "จ่อ barcode ให้ชัดในกรอบ แล้วกดปุ่มสแกน";
            } catch (err) {
                scanning = false;
                document.getElementById("video-hint").textContent = "เปิดกล้องไม่ได้ — ใช้ช่องพิมพ์ด้านล่างแทน";
            }
        }

        /* กดปุ่มสแกน → ลอง decode ต่อเนื่องสูงสุด ~4 วินาที (หลายเฟรม + หลายมุมมอง) เจอแล้วหยุดทันที */
        let capturing = false;

        /* decode 1 canvas ผ่าน decodeFromImageUrl (เมธอดที่มีจริงใน ZXing UMD build นี้) */
        async function decodeCanvas(canvas) {
            try {
                const result = await codeReader.decodeFromImageUrl(canvas.toDataURL("image/jpeg", 0.92));
                return result.getText();
            } catch (e) { return null; }
        }

        async function tryDecodeFrame(video) {
            const W = video.videoWidth, H = video.videoHeight;
            const full = document.createElement("canvas");
            full.width = W; full.height = H;
            full.getContext("2d").drawImage(video, 0, 0);

            // มุมมอง 1: ภาพเต็ม
            let text = await decodeCanvas(full);
            if (text) return text;

            // มุมมอง 2: crop เฉพาะบริเวณกรอบไกด์ (ตัด noise รอบข้างออก ช่วย binarizer มาก)
            {
                const cx = Math.floor(W * 0.06), cy = Math.floor(H * 0.24);
                const cw = W - cx * 2, ch = H - cy * 2;
                const crop = document.createElement("canvas");
                crop.width = cw; crop.height = ch;
                crop.getContext("2d").drawImage(full, cx, cy, cw, ch, 0, 0, cw, ch);
                text = await decodeCanvas(crop);
                if (text) return text;
            }

            // มุมมอง 3: crop กลางภาพแล้วขยาย 2 เท่า (ช่วยกรณี barcode เล็ก/อยู่ไกล)
            {
                const cx = Math.floor(W * 0.18), cy = Math.floor(H * 0.30);
                const cw = W - cx * 2, ch = H - cy * 2;
                const zoom = document.createElement("canvas");
                zoom.width = cw * 2; zoom.height = ch * 2;
                const ctx = zoom.getContext("2d");
                ctx.imageSmoothingEnabled = true;
                ctx.drawImage(full, cx, cy, cw, ch, 0, 0, cw * 2, ch * 2);
                text = await decodeCanvas(zoom);
                if (text) return text;
            }

            return null;
        }

        async function captureScan() {
            const video = document.getElementById("video");
            const btn = document.getElementById("capture-btn");
            if (!scanning || !video.videoWidth) { toast("กล้องยังไม่พร้อม"); return; }
            if (capturing) return;
            capturing = true;
            btn.disabled = true;
            const origLabel = btn.textContent;
            btn.textContent = "⏳ กำลังสแกน...";
            try {
                // ลองซ้ำสูงสุด 12 รอบ (~4 วินาที) — ครอบคลุมจังหวะกล้องโฟกัสเข้า
                for (let i = 0; i < 12; i++) {
                    const text = await tryDecodeFrame(video);
                    if (text) {
                        if (navigator.vibrate) navigator.vibrate(80);
                        showResult(text);
                        document.getElementById("manual-input").value = text;
                        return;
                    }
                    await new Promise(r => setTimeout(r, 150));
                }
                toast("ไม่พบ barcode — ขยับเข้าใกล้ให้ barcode กว้างเกือบเต็มกรอบ แล้วลองใหม่");
            } finally {
                capturing = false;
                btn.disabled = false;
                btn.textContent = origLabel;
            }
        }

        function stopScanner() {
            if (cameraStream) {
                cameraStream.getTracks().forEach(t => t.stop());
                cameraStream = null;
            }
            const video = document.getElementById("video");
            if (video) video.srcObject = null;
            scanning = false;
        }

        /* ---------- Navigation ---------- */
        function showScreen(name) {
            document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
            document.querySelectorAll("nav button").forEach(b => b.classList.remove("active"));
            const map = { scan: "scan", detail: "scan", edit: "scan", add: "scan", list: "list", history: "history" };
            document.getElementById("screen-" + name).classList.add("active");
            const navBtn = document.getElementById("nav-" + (map[name] || name));
            if (navBtn) navBtn.classList.add("active");
            if (name === "scan") startScanner(); else stopScanner();
            if (name === "history") renderHistory();
            if (name === "list") renderList(document.getElementById("list-filter").value);
        }

        /* ---------- Utils ---------- */
        function esc(s) {
            return String(s ?? "").replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
        }
        function getUser() {
            try {
                let u = localStorage.getItem("user_name");
                if (!u) {
                    u = prompt("ใส่ชื่อผู้ใช้งาน (แสดงใน log):") || "unknown";
                    localStorage.setItem("user_name", u);
                }
                return u;
            } catch (e) { return "unknown"; }
        }
        let toastTimer;
        function toast(msg) {
            const t = document.getElementById("toast");
            t.textContent = msg;
            t.classList.add("show");
            clearTimeout(toastTimer);
            toastTimer = setTimeout(() => t.classList.remove("show"), 2500);
        }

        /* ---------- Enter key = search ---------- */
        document.getElementById("manual-input").addEventListener("keydown", e => {
            if (e.key === "Enter") manualSearch();
        });

        /* ---------- Init ---------- */
        Promise.all([loadAssets(), loadRooms(), loadRacks()]).then(() => startScanner());
    </script>
</body>

</html>
